<title>1980s Portugal Rock Concerts — Browse</title>
<style>
    /* Blogger template overrides */
    #primarybwrap { width: 100%; max-width: 1150px; }
    #secondarybwrap, #comments { display: none; }

    /* Global Base Settings (No Tailwind Needed) */
    .concert-wrapper {
        max-width: 1000px;
        margin: 0 auto;
        padding: 24px;
        color: #f4f4f5;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        box-sizing: border-box;
    }
    .concert-wrapper *, .concert-wrapper *:before, .concert-wrapper *:after {
        box-sizing: inherit;
    }

    /* Layout Helpers */
    .flex { display: flex; }
    .flex-1 { flex: 1 1 auto; }
    .gap-2 { gap: 8px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-4 { margin-bottom: 16px; }
    .mb-6 { margin-bottom: 24px; }
    .hidden { display: none !important; }

    /* Structural Panels */
    .card-dark { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 24px; }
    .table-card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; overflow: hidden; }

    /* Scrollbars */
    .custom-scrollbar { overflow-x: auto; max-height: 860px; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #4b5563; border-radius: 10px; }

    /* Inputs */
    .input-dark { width: 100%; padding: 10px 12px; background: #27272a; border: 1px solid #3f3f46; color: #fff; border-radius: 8px; outline: none; transition: border-color 0.2s; font-size: 14px; }
    .input-dark:focus { border-color: #3b82f6; }
    .w-auto { width: auto; }

    /* Interactive Color Tokens */
    .text-amber-link { color: #fbbf24; font-size: 13px; text-decoration: none; background: none; border: none; cursor: pointer; padding: 0; font-family: inherit; }
    .text-amber-link:hover { text-decoration: underline; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; font-weight: 600; padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; transition: background-color 0.2s; width: 100%; white-space: nowrap; }
    .btn-blue { background: #2563eb; color: white; }
    .btn-blue:hover { background: #1d4ed8; }
    .btn-zinc { background: #3f3f46; color: white; }
    .btn-zinc:hover { background: #52525b; }

    /* Navigation Tabs */
    .tab-bar { display: flex; gap: 24px; margin-bottom: 24px; border-bottom: 1px solid #27272a; }
    .tab-btn { padding-bottom: 10px; font-size: 14px; color: #71717a; background: none; border: none; border-bottom: 2px solid transparent; cursor: pointer; }
    .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; font-weight: 600; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* Fixed Table System */
    .table-dark { width: 100%; text-align: left; border-collapse: collapse; table-layout: fixed; }
    .table-dark th { background: #27272a; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #a1a1aa; padding: 12px 24px; position: sticky; top: 0; white-space: nowrap; }
    .table-dark td { padding: 14px 24px; border-bottom: 1px solid #27272a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .table-dark tbody tr { transition: background-color 0.2s; }
    .table-dark tbody tr:hover { background-color: rgba(255, 255, 255, 0.04); }

    /* Sortable headers */
    .th-sortable { cursor: pointer; user-select: none; }
    .th-sortable:hover { color: #e4e4e7; }
    .sort-arrow { display: inline-block; margin-left: 4px; opacity: 0.6; font-size: 11px; }

    /* Clickable artist/venue/promoter links within concert rows */
    .link-cell { color: #60a5fa; text-decoration: none; cursor: pointer; }
    .link-cell:hover { text-decoration: underline; }

    /* Ticket badge column */
    .ticket-col { text-align: center; }

    /* Filter banner */
    .filter-banner { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; margin-bottom: 12px; font-size: 14px; color: #93c5fd; }
    .filter-banner button { background: none; border: none; color: #93c5fd; cursor: pointer; font-size: 13px; text-decoration: underline; }

    /* Status / loading */
    .status-banner { padding: 12px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; margin-bottom: 16px; }
    .status-error { background: #451a03; color: #f87171; border: 1px solid #7c2d12; }
    .loading-note { color: #71717a; font-size: 14px; padding: 32px; text-align: center; }
</style>

<div class="concert-wrapper">
    <h2 class="mb-6" style="font-size: 1.4rem; margin-top: 0px;">🎸 1980s Portugal Rock Concerts</h2>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="switchTab('concerts', event)">📋 Concerts</button>
        <button class="tab-btn" onclick="switchTab('artists', event)">🎤 Artists</button>
        <button class="tab-btn" onclick="switchTab('venues', event)">🏟️ Venues</button>
        <button class="tab-btn" onclick="switchTab('promoters', event)">🎪 Promoters</button>
    </div>

    <div class="hidden status-banner status-error" id="statusMsg"></div>

    <div class="tab-panel active table-card" id="tab-concerts">
        <div style="padding: 16px 16px 0 16px;">
            <div class="flex gap-2 mb-3" style="align-items: stretch;">
                <input class="input-dark" id="concertSearch" type="text" placeholder="🔎 Search artist, venue, tour, or year..." oninput="renderConcertsTable()" />
                <button class="btn btn-zinc w-auto" onclick="openExportPanel()">⬇ Export CSV</button>
            </div>
            <div class="hidden filter-banner" id="filterBanner">
                <span id="filterBannerText"></span>
                <button onclick="clearFilter()">Clear filter ✕</button>
            </div>
            <div class="hidden card-dark mb-3" id="exportPanel" style="padding: 16px;">
                <p class="mb-3" style="margin-top: 0; font-size: 14px; color: #d4d4d8;">Export which concerts?</p>
                <div class="flex gap-2" style="flex-wrap: wrap;">
                    <button class="btn btn-blue flex-1" style="min-width: 140px;" onclick="exportConcertsCsv('visible')">Visible (<span id="exportVisibleCount">0</span>)</button>
                    <button class="btn btn-blue flex-1" style="min-width: 110px;" onclick="exportConcertsCsv('all')">All concerts</button>
                    <button class="btn btn-zinc w-auto" onclick="closeExportPanel()">Cancel</button>
                </div>
            </div>
        </div>
        <div class="custom-scrollbar">
            <table class="table-dark">
                <colgroup>
                    <col style="width: 18%;"></col>
                    <col style="width: 28%;"></col>
                    <col style="width: 28%;"></col>
                    <col style="width: 18%;"></col>
                    <col style="width: 8%;"></col>
                </colgroup>
                <thead>
                    <tr>
                        <th class="th-sortable" onclick="sortConcertsBy('date')">Date<span class="sort-arrow" id="arrow-date"></span></th>
                        <th class="th-sortable" onclick="sortConcertsBy('artist')">Artist<span class="sort-arrow" id="arrow-artist"></span></th>
                        <th class="th-sortable" onclick="sortConcertsBy('venue')">Venue<span class="sort-arrow" id="arrow-venue"></span></th>
                        <th>Promoter</th>
                        <th class="ticket-col">🎫</th>
                    </tr>
                </thead>
                <tbody id="viewerBody">
                    <tr><td colspan="5" class="loading-note">Loading…</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="tab-panel" id="tab-artists">
        <div class="table-card">
            <div class="custom-scrollbar" style="max-height: 780px;">
                <table class="table-dark">
                    <colgroup>
                        <col style="width: 55%;"></col>
                        <col style="width: 28%;"></col>
                        <col style="width: 17%;"></col>
                    </colgroup>
                    <thead>
                        <tr>
                            <th class="th-sortable" onclick="sortEntityTable('artists', 'name')">Name<span class="sort-arrow" id="arrow-artists-name"></span></th>
                            <th>Country</th>
                            <th class="th-sortable" onclick="sortEntityTable('artists', 'count')">Concerts<span class="sort-arrow" id="arrow-artists-count"></span></th>
                        </tr>
                    </thead>
                    <tbody id="artistsBody">
                        <tr><td colspan="3" class="loading-note">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="tab-panel" id="tab-venues">
        <div class="table-card">
            <div class="custom-scrollbar" style="max-height: 780px;">
                <table class="table-dark">
                    <colgroup>
                        <col style="width: 55%;"></col>
                        <col style="width: 28%;"></col>
                        <col style="width: 17%;"></col>
                    </colgroup>
                    <thead>
                        <tr>
                            <th class="th-sortable" onclick="sortEntityTable('venues', 'name')">Name<span class="sort-arrow" id="arrow-venues-name"></span></th>
                            <th>City</th>
                            <th class="th-sortable" onclick="sortEntityTable('venues', 'count')">Concerts<span class="sort-arrow" id="arrow-venues-count"></span></th>
                        </tr>
                    </thead>
                    <tbody id="venuesBody">
                        <tr><td colspan="3" class="loading-note">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="tab-panel" id="tab-promoters">
        <div class="table-card">
            <div class="custom-scrollbar" style="max-height: 780px;">
                <table class="table-dark">
                    <colgroup>
                        <col style="width: 70%;"></col>
                        <col style="width: 30%;"></col>
                    </colgroup>
                    <thead>
                        <tr>
                            <th class="th-sortable" onclick="sortEntityTable('promoters', 'name')">Name<span class="sort-arrow" id="arrow-promoters-name"></span></th>
                            <th class="th-sortable" onclick="sortEntityTable('promoters', 'count')">Concerts<span class="sort-arrow" id="arrow-promoters-count"></span></th>
                        </tr>
                    </thead>
                    <tbody id="promotersBody">
                        <tr><td colspan="2" class="loading-note">Loading…</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    // Read-only viewer: only ever calls doGet on the same Apps Script backend.
    // No POST requests exist anywhere in this page — nothing here can modify data.
    const API_URL = "https://script.google.com/macros/s/AKfycbxMIhuMairbXKsG8x-vjXicXss6xMFIvdYpfX39qDxzSFWIgn-jMwbyokBNZIJUK9my/exec";

    let artistMap   = {};
    let venueMap    = {};
    let promoterMap = {};
    let allArtists   = [];
    let allVenues    = [];
    let allPromoters = [];
    let allConcerts  = [];

    let activeFilter = null;
    let sortField = 'date';
    let sortDir   = 'desc';

    // Sort state for the Artists/Venues/Promoters tables: each entity tracks
    // its own field ('name' or 'count') and direction independently.
    let entitySort = {
        artists:   { field: 'name', dir: 'asc' },
        venues:    { field: 'name', dir: 'asc' },
        promoters: { field: 'name', dir: 'asc' }
    };

    window.onload = () => loadData();

    function switchTab(name, evt) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        if (evt && evt.currentTarget) {
            evt.currentTarget.classList.add('active');
        }
    }

    function loadData() {
        fetch(API_URL)
            .then(res => res.json())
            .then(data => populateApp(data))
            .catch(err => showStatus("Error loading data: " + err, "error"));
    }

    function populateApp(data) {
        artistMap   = {};
        venueMap    = {};
        promoterMap = {};

        allArtists   = data.artists   || [];
        allVenues    = data.venues    || [];
        allPromoters = data.promoters || [];
        allConcerts  = data.concerts  || [];

        allArtists.forEach(row   => { artistMap[row[0]]   = row[1]; });
        allVenues.forEach(row    => { venueMap[row[0]]    = row[1]; });
        allPromoters.forEach(row => { promoterMap[row[0]] = row[1]; });

        renderConcertsTable();
        renderArtistsTable();
        renderVenuesTable();
        renderPromotersTable();
    }

    function escapeHtml(str) {
        return String(str ?? "").replace(/[&<>"']/g, c => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[c]));
    }

    // ── Concerts: search, filter, sort, year-grouping ────────────────────

    function getVisibleConcerts() {
        let rows = allConcerts.slice();

        if (activeFilter) {
            const colIndexMap = { artist: 2, venue: 3, promoter: 8 };
            const colIndex = colIndexMap[activeFilter.type];
            rows = rows.filter(row => String(row[colIndex]) === String(activeFilter.id));
        }

        const searchBox = document.getElementById("concertSearch");
        const query = searchBox ? searchBox.value.trim().toLowerCase() : "";
        if (query) {
            rows = rows.filter(row => {
                const artistName = (artistMap[row[2]] || row[2] || "").toString().toLowerCase();
                const venueName  = (venueMap[row[3]] || row[3] || "").toString().toLowerCase();
                const tourName   = (row[6] || "").toString().toLowerCase();
                const dateStr    = (row[1] ? String(row[1]).split('T')[0] : "").toLowerCase();
                return artistName.includes(query) || venueName.includes(query) ||
                       tourName.includes(query) || dateStr.includes(query);
            });
        }

        rows.sort((a, b) => {
            let valA, valB;
            if (sortField === 'date') {
                valA = a[1] ? String(a[1]) : "";
                valB = b[1] ? String(b[1]) : "";
            } else if (sortField === 'artist') {
                valA = (artistMap[a[2]] || a[2] || "").toString().toLowerCase();
                valB = (artistMap[b[2]] || b[2] || "").toString().toLowerCase();
            } else {
                valA = (venueMap[a[3]] || a[3] || "").toString().toLowerCase();
                valB = (venueMap[b[3]] || b[3] || "").toString().toLowerCase();
            }
            if (valA < valB) return sortDir === 'asc' ? -1 : 1;
            if (valA > valB) return sortDir === 'asc' ? 1 : -1;
            return 0;
        });

        return rows;
    }

    function sortConcertsBy(field) {
        if (sortField === field) {
            sortDir = (sortDir === 'asc') ? 'desc' : 'asc';
        } else {
            sortField = field;
            sortDir = 'asc';
        }
        renderConcertsTable();
    }

    function updateSortArrows() {
        ['date', 'artist', 'venue'].forEach(f => {
            const el = document.getElementById('arrow-' + f);
            if (!el) return;
            el.textContent = (f === sortField) ? (sortDir === 'asc' ? '^' : 'v') : '';
        });
    }

    function renderConcertsTable() {
        updateSortArrows();
        renderFilterBanner();
        updateExportVisibleCount();

        const viewerBody = document.getElementById("viewerBody");
        viewerBody.innerHTML = "";

        const rows = getVisibleConcerts();

        if (rows.length === 0) {
            const searchBox = document.getElementById("concertSearch");
            const hasQuery = searchBox && searchBox.value.trim();
            let msg = "No concerts yet.";
            if (activeFilter && hasQuery) msg = "No concerts match this filter and search.";
            else if (activeFilter) msg = "No concerts match this filter.";
            else if (hasQuery) msg = "No concerts match your search.";
            viewerBody.innerHTML = `<tr><td colspan="5" style="text-align: center; color: #71717a; padding: 32px;">${msg}</td></tr>`;
            return;
        }

        // Year-group headers only make sense when sorted by date.
        const groupByYear = (sortField === 'date');
        let lastYear = null;

        rows.forEach(row => {
            if (groupByYear) {
                const yearStr = row[1] ? String(row[1]).split('T')[0].split('-')[0] : 'Unknown';
                if (yearStr !== lastYear) {
                    lastYear = yearStr;
                    const yearRow = document.createElement("tr");
                    yearRow.innerHTML = `<td colspan="5" style="background:#1f2937; color:#93c5fd; font-weight:600; font-size:12px; letter-spacing:0.05em; padding:8px 24px; cursor:default;">— ${escapeHtml(yearStr)} —</td>`;
                    viewerBody.appendChild(yearRow);
                }
            }

            const tr = document.createElement("tr");

            const artistName   = artistMap[row[2]] || row[2] || '—';
            const venueName    = venueMap[row[3]]  || row[3] || '—';
            const promoterName = promoterMap[row[8]] || row[8] || '—';
            const hasTicket    = String(row[9]).toUpperCase() === "TRUE";

            tr.innerHTML = `
                <td style="font-weight: 500; color: #fff;">${row[1] ? String(row[1]).split('T')[0] : 'N/A'}</td>
                <td><span class="link-cell" onclick="filterByArtist('${row[2]}', \`${escapeHtml(artistName).replace(/`/g, "'")}\`)">${escapeHtml(artistName)}</span></td>
                <td><span class="link-cell" onclick="filterByVenue('${row[3]}', \`${escapeHtml(venueName).replace(/`/g, "'")}\`)">${escapeHtml(venueName)}</span></td>
                <td style="color: #a1a1aa;">${escapeHtml(promoterName)}</td>
                <td class="ticket-col">${hasTicket ? '🎫' : ''}</td>`;
            viewerBody.appendChild(tr);
        });
    }

    function filterByArtist(id, name) {
        activeFilter = { type: 'artist', id: id, name: name };
        switchTab('concerts');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        renderConcertsTable();
    }

    function filterByVenue(id, name) {
        activeFilter = { type: 'venue', id: id, name: name };
        switchTab('concerts');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        renderConcertsTable();
    }

    function filterByPromoter(id, name) {
        activeFilter = { type: 'promoter', id: id, name: name };
        switchTab('concerts');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        renderConcertsTable();
    }

    function clearFilter() {
        activeFilter = null;
        renderConcertsTable();
    }

    function renderFilterBanner() {
        const banner = document.getElementById("filterBanner");
        const text   = document.getElementById("filterBannerText");
        if (activeFilter) {
            const labelMap = { artist: 'Artist', venue: 'Venue', promoter: 'Promoter' };
            const label = labelMap[activeFilter.type] || 'Filter';
            text.textContent = `Showing concerts for ${label}: ${activeFilter.name}`;
            banner.classList.remove("hidden");
        } else {
            banner.classList.add("hidden");
        }
    }

    // ── CSV export ────────────────────────────────────────────────────

    function openExportPanel() {
        updateExportVisibleCount();
        document.getElementById("exportPanel").classList.remove("hidden");
    }

    function closeExportPanel() {
        document.getElementById("exportPanel").classList.add("hidden");
    }

    function updateExportVisibleCount() {
        const el = document.getElementById("exportVisibleCount");
        if (el) el.textContent = getVisibleConcerts().length;
    }

    function csvEscape(value) {
        const str = String(value ?? "");
        if (/[",\n]/.test(str)) {
            return '"' + str.replace(/"/g, '""') + '"';
        }
        return str;
    }

    function exportConcertsCsv(scope) {
        const rows = (scope === 'all') ? allConcerts.slice() : getVisibleConcerts();

        const headers = ["Date", "Artist", "Venue", "Price", "Currency", "Tour", "Notes", "Promoter", "Has Ticket"];
        const lines = [headers.map(csvEscape).join(",")];

        rows.forEach(row => {
            const artistName   = artistMap[row[2]] || row[2] || "";
            const venueName    = venueMap[row[3]]  || row[3] || "";
            const promoterName = promoterMap[row[8]] || row[8] || "";
            const dateStr      = row[1] ? String(row[1]).split('T')[0] : "";
            const hasTicket     = String(row[9]).toUpperCase() === "TRUE" ? "Yes" : "No";

            lines.push([
                dateStr, artistName, venueName, row[4] || "", row[5] || "",
                row[6] || "", row[7] || "", promoterName, hasTicket
            ].map(csvEscape).join(","));
        });

        const csvContent = lines.join("\r\n");
        const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement("a");
        const dateTag = new Date().toISOString().split('T')[0];
        a.href = url;
        a.download = `concerts-export-${scope}-${dateTag}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);

        closeExportPanel();
    }

    // ── Artists / Venues / Promoters: read-only lists ────────────────────

    function getConcertCounts(colIndex) {
        const counts = {};
        allConcerts.forEach(row => {
            const id = row[colIndex];
            if (!id) return;
            counts[id] = (counts[id] || 0) + 1;
        });
        return counts;
    }

    function sortEntityTable(entity, field) {
        const state = entitySort[entity];
        if (state.field === field) {
            state.dir = (state.dir === 'asc') ? 'desc' : 'asc';
        } else {
            state.field = field;
            // Sensible defaults: names A→Z first, counts highest-first.
            state.dir = (field === 'count') ? 'desc' : 'asc';
        }
        if (entity === 'artists')   renderArtistsTable();
        if (entity === 'venues')    renderVenuesTable();
        if (entity === 'promoters') renderPromotersTable();
    }

    function updateEntitySortArrows(entity) {
        const state = entitySort[entity];
        ['name', 'count'].forEach(f => {
            const el = document.getElementById(`arrow-${entity}-${f}`);
            if (!el) return;
            el.textContent = (f === state.field) ? (state.dir === 'asc' ? '^' : 'v') : '';
        });
    }

    function sortEntityRows(rows, state, nameIndex, countMap, idIndex) {
        const sorted = rows.slice();
        sorted.sort((a, b) => {
            let valA, valB;
            if (state.field === 'count') {
                valA = countMap[a[idIndex]] || 0;
                valB = countMap[b[idIndex]] || 0;
            } else {
                valA = (a[nameIndex] || "").toString().toLowerCase();
                valB = (b[nameIndex] || "").toString().toLowerCase();
            }
            if (valA < valB) return state.dir === 'asc' ? -1 : 1;
            if (valA > valB) return state.dir === 'asc' ? 1 : -1;
            return 0;
        });
        return sorted;
    }

    function renderArtistsTable() {
        updateEntitySortArrows('artists');
        const tbody = document.getElementById("artistsBody");
        tbody.innerHTML = "";
        if (allArtists.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #71717a; padding: 32px;">No artists yet.</td></tr>`;
            return;
        }
        const counts = getConcertCounts(2); // column 2 = artistId in concerts rows
        const rows = sortEntityRows(allArtists, entitySort.artists, 1, counts, 0);
        rows.forEach(row => {
            const tr = document.createElement("tr");
            const count = counts[row[0]] || 0;
            tr.innerHTML = `
                <td>
                    <button onclick="filterByArtist('${row[0]}', \`${escapeHtml(row[1] || '').replace(/`/g,"'")}\`)" class="text-amber-link" style="font-weight: 500; font-size: 14px;">
                        ${escapeHtml(row[1])}
                    </button>
                </td>
                <td style="color: #a1a1aa;">${escapeHtml(row[2]) || '—'}</td>
                <td style="color: #a1a1aa;">${count}</td>`;
            tbody.appendChild(tr);
        });
    }

    function renderVenuesTable() {
        updateEntitySortArrows('venues');
        const tbody = document.getElementById("venuesBody");
        tbody.innerHTML = "";
        if (allVenues.length === 0) {
            tbody.innerHTML = `<tr><td colspan="3" style="text-align: center; color: #71717a; padding: 32px;">No venues yet.</td></tr>`;
            return;
        }
        const counts = getConcertCounts(3); // column 3 = venueId in concerts rows
        const rows = sortEntityRows(allVenues, entitySort.venues, 1, counts, 0);
        rows.forEach(row => {
            const tr = document.createElement("tr");
            const count = counts[row[0]] || 0;
            tr.innerHTML = `
                <td>
                    <button onclick="filterByVenue('${row[0]}', \`${escapeHtml(row[1] || '').replace(/`/g,"'")}\`)" class="text-amber-link" style="font-weight: 500; font-size: 14px;">
                        ${escapeHtml(row[1])}
                    </button>
                </td>
                <td style="color: #a1a1aa;">${escapeHtml(row[2]) || '—'}</td>
                <td style="color: #a1a1aa;">${count}</td>`;
            tbody.appendChild(tr);
        });
    }

    function renderPromotersTable() {
        updateEntitySortArrows('promoters');
        const tbody = document.getElementById("promotersBody");
        tbody.innerHTML = "";
        if (allPromoters.length === 0) {
            tbody.innerHTML = `<tr><td colspan="2" style="text-align: center; color: #71717a; padding: 32px;">No promoters yet.</td></tr>`;
            return;
        }
        const counts = getConcertCounts(8); // column 8 = promoterId in concerts rows
        const rows = sortEntityRows(allPromoters, entitySort.promoters, 1, counts, 0);

                        ${escapeHtml(row[1])}
                    </button>
                </td>
                <td style="color: #a1a1aa;">${count}</td>`;
            tbody.appendChild(tr);

    }

    function showStatus(message, type) {
        const el = document.getElementById("statusMsg");
        el.innerText = message;
        el.className = (type === "error") ? "status-banner status-error" : "status-banner";
        el.classList.remove("hidden");
    }
</script>
