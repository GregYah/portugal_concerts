<title>1980s Portugal Rock Concerts</title>
<style>
    /* Blogger template overrides */
    #primarybwrap { width: 100%; max-width: 1150px; }
    #secondarybwrap, #comments { display: none; }      
    
    /* Global Base Settings (No Tailwind Needed) */
    .concert-wrapper { 
        max-width: 1200px; 
        margin: 0 auto; 
        padding: 14px; 
        color: #f4f4f5; 
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        box-sizing: border-box;
    }
    .concert-wrapper *, .concert-wrapper *:before, .concert-wrapper *:after {
        box-sizing: inherit;
    }

    /* Core Layout Grid */
    .concert-layout { 
        display: grid; 
        grid-template-columns: 1fr; 
        gap: 22px; 
        align-items: start; 
    }
    @media (min-width: 1024px) { 
        .concert-layout { grid-template-columns: 1fr 2fr; } 
    }
    
    /* Layout Helpers */
    .flex { display: flex; }
    .flex-1 { flex: 1 1 auto; }
    .gap-2 { gap: 8px; }
    .gap-6 { gap: 24px; }
    .mt-2 { margin-top: 8px; }
    .mt-3 { margin-top: 12px; }
    .mb-3 { margin-bottom: 12px; }
    .mb-6 { margin-bottom: 24px; }
    .sticky-top { position: sticky; top: 32px; }
    .hidden { display: none !important; }
    .cursor-pointer { cursor: pointer; }
    .items-center { align-items: center; }

    /* Structural Panels */
    .card-dark { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 24px; }
    .table-card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; overflow: hidden; }
    
    /* Scrollbars */
    .custom-scrollbar { overflow-x: auto; max-height: 860px; }
    .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #4b5563; border-radius: 10px; }
    
    /* Simple controls */
    .control-bar { display:flex; gap:12px; align-items:center; }

    /* Forms & Inputs */
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 14px; font-weight: 500; color: #a1a1aa; margin-bottom: 6px; }
    .input-dark { width: 100%; padding: 10px 12px; background: #27272a; border: 1px solid #3f3f46; color: #fff; border-radius: 8px; outline: none; transition: border-color 0.2s; font-size: 14px; }
    .input-dark:focus { border-color: #3b82f6; }
    textarea.input-dark { resize: vertical; min-height: 80px; }
    .w-auto { width: auto; }

    /* Interactive Color Tokens */
    .text-emerald { color: #34d399; font-size: 14px; }
    .text-blue-link { color: #60a5fa; font-size: 13px; text-decoration: none; background: none; border: none; cursor: pointer; }
    .text-blue-link:hover { text-decoration: underline; }
    .text-amber-link { color: #fbbf24; font-size: 13px; text-decoration: none; background: none; border: none; cursor: pointer; padding: 0; font-family: inherit; }
    .text-amber-link:hover { text-decoration: underline; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; font-weight: 600; padding: 10px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 14px; }
    .btn-blue { background: #2563eb; color: white; }
    .btn-blue:hover { background: #1d4ed8; }
    .btn-zinc { background: #3f3f46; color: white; }
    .btn-zinc:hover { background: #52525b; }
    
    /* Fixed Table System */
    .table-dark { width: 100%; text-align: left; border-collapse: collapse; table-layout: fixed; }
    .table-dark th { background: #27272a; font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #a1a1aa; padding: 12px 24px; position: sticky; top: 0; white-space: nowrap; }
    .table-dark td { padding: 10px 14px; border-bottom: 1px solid #27272a; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .table-dark tbody tr { transition: background-color 0.2s; }
    .table-dark tbody tr:hover { background-color: rgba(255, 255, 255, 0.04); }
    .row-clickable { cursor: pointer; }

    /* Sortable headers */
    .th-sortable { cursor: pointer; user-select: none; }
    .th-sortable:hover { color: #e4e4e7; }
    .sort-arrow { display: inline-block; margin-left: 4px; opacity: 0.6; font-size: 11px; }

    /* Clickable artist/venue links within concert rows */
    .link-cell { color: #60a5fa; text-decoration: none; cursor: pointer; }
    .link-cell:hover { text-decoration: underline; }

    /* Ticket badge column */
    .ticket-col { text-align: center; }

    /* Filter banner */
    .filter-banner { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; margin-bottom: 12px; }
    .filter-banner button { background: none; border: none; color: #93c5fd; cursor: pointer; font-size: 13px; text-decoration: underline; }

    /* Dynamic Messaging */
    .status-banner { padding: 12px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; margin-bottom: 16px; }
    .status-error { background: #451a03; color: #f87171; border: 1px solid #7c2d12; }
    .status-success { background: #064e3b; color: #34d399; border: 1px solid #065f46; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: none; align-items: center; justify-content: center; z-index: 1000; }
    .modal { background: #0b1020; border: 1px solid #27272a; border-radius: 10px; width: 92%; max-width: 760px; padding: 20px; color: #e6eef8; box-shadow: 0 8px 30px rgba(2,6,23,0.6); }
    .modal h3 { margin-top: 0; }
    .modal .row { display:flex; gap:12px; margin-bottom:8px; }
    .modal .label { color:#9aa6b8; width:140px; flex-shrink:0; }
    .modal .value { color:#e6eef8; flex:1; }
    .modal .close-btn { background:none; border:none; color:#93c5fd; cursor:pointer; font-weight:600; }
    @media (min-width:600px){ .modal .row { align-items:center; } }
</style>

<div class="concert-wrapper">
    <div class="concert-layout">
        <div class="card-dark sticky-top">
            <h2 class="mb-3" style="font-size:1.25rem;margin-top:0;">🎸 Portugal Rock Concerts — Browse</h2>
            <div class="control-bar">
                <input class="input-dark" id="concertSearch" type="text" placeholder="🔎 Search artist, venue, tour, or year..." oninput="renderConcertsTable()" />
                <button class="btn btn-zinc w-auto" onclick="openExportPanel()">⬇ Export CSV</button>
            </div>
        </div>

        <div class="space-y-6">
            <div class="hidden status-banner" id="statusMsg"></div>

            <div class="tab-panel active table-card" id="tab-concerts">
                <div style="padding: 16px 16px 0 16px;">
                    <div class="hidden filter-banner" id="filterBanner">
                        <span id="filterBannerText"></span>
                        <button onclick="clearFilter()">Clear filter ✕</button>
                    </div>
                    <div class="hidden card-dark mb-3" id="exportPanel" style="padding: 16px;">
                        <p class="mb-3" style="margin-top: 0; font-size: 14px; color: #d4d4d8;">Export which concerts?</p>
                        <div class="flex gap-2" style="flex-wrap: wrap;">
                            <button class="btn btn-blue flex-1" style="white-space: nowrap; min-width: 140px;" onclick="exportConcertsCsv('visible')">Visible (<span id="exportVisibleCount">0</span>)</button>
                            <button class="btn btn-blue flex-1" style="white-space: nowrap; min-width: 110px;" onclick="exportConcertsCsv('all')">All concerts</button>
                            <button class="btn btn-zinc w-auto" style="white-space: nowrap;" onclick="closeExportPanel()">Cancel</button>
                        </div>
                    </div>
                </div>
                <div class="custom-scrollbar">
                    <table class="table-dark" aria-describedby="concertSearch">
                        <colgroup>
                            <col style="width: 20%;"></col>
                            <col style="width: 40%;"></col>
                            <col style="width: 33%;"></col>
                            <col style="width: 7%;"></col>
                        </colgroup>
                        <thead>
                            <tr>
                                <th class="th-sortable" data-sort="date" onclick="sortConcertsBy('date')">Date<span class="sort-arrow" id="arrow-date"></span></th>
                                <th class="th-sortable" data-sort="artist" onclick="sortConcertsBy('artist')">Artist<span class="sort-arrow" id="arrow-artist"></span></th>
                                <th class="th-sortable" data-sort="venue" onclick="sortConcertsBy('venue')">Venue<span class="sort-arrow" id="arrow-venue"></span></th>
                                <th class="ticket-col">🎫</th>
                            </tr>
                        </thead>
                        <tbody id="viewerBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Modal (read-only) -->
<div id="concertModalOverlay" class="modal-overlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal" role="document" id="concertModal">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h3 id="modalTitle">Concert Details</h3>
            <button class="close-btn" id="modalCloseBtn">Close ✕</button>
        </div>
        <div id="modalBody" style="margin-top:12px;">
            <!-- populated by JS -->
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxMIhuMairbXKsG8x-vjXicXss6xMFIvdYpfX39qDxzSFWIgn-jMwbyokBNZIJUK9my/exec";

    let artistMap = {};
    let venueMap  = {};
    let promoterMap = {};
    let allArtists = [];
    let allVenues  = [];
    let allPromoters = [];
    let allConcerts = [];

    let activeFilter = null;
    let sortField = 'date';
    let sortDir   = 'desc';

    window.onload = () => loadData();

    function loadData() {
        fetch(API_URL)
            .then(res => res.json())
            .then(data => populateApp(data))
            .catch(err => showStatus('Error loading data: ' + err, 'error'));
    }

    function populateApp(data) {
        artistMap  = {};
        venueMap   = {};
        promoterMap = {};

        const byName = (a, b) => (a[1] || '').toString().toLowerCase().localeCompare((b[1] || '').toString().toLowerCase());

        allArtists   = (data.artists   || []).slice().sort(byName);
        allVenues    = (data.venues    || []).slice().sort(byName);
        allPromoters = (data.promoters || []).slice().sort(byName);
        allConcerts  = data.concerts || [];

        allArtists.forEach(row => { artistMap[row[0]] = row[1]; });
        allVenues.forEach(row => { venueMap[row[0]] = row[1]; });
        allPromoters.forEach(row => { promoterMap[row[0]] = row[1]; });

        renderConcertsTable();
    }

    function escapeHtml(str) {
        return String(str ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' })[c]);
    }

    function getVisibleConcerts() {
        let rows = allConcerts.slice();

        if (activeFilter) {
            const colIndexMap = { artist: 2, venue: 3, promoter: 8 };
            const colIndex = colIndexMap[activeFilter.type];
            rows = rows.filter(row => String(row[colIndex]) === String(activeFilter.id));
        }

        const query = (document.getElementById('concertSearch')?.value || '').trim().toLowerCase();
        if (query) {
            rows = rows.filter(row => {
                const artistName = (artistMap[row[2]] || row[2] || '').toString().toLowerCase();
                const venueName  = (venueMap[row[3]] || row[3] || '').toString().toLowerCase();
                const tourName   = (row[6] || '').toString().toLowerCase();
                const dateStr    = (row[1] ? String(row[1]).split('T')[0] : '').toLowerCase();
                return artistName.includes(query) || venueName.includes(query) || tourName.includes(query) || dateStr.includes(query);
            });
        }

        rows.sort((a, b) => {
            let valA, valB;
            if (sortField === 'date') {
                valA = a[1] ? String(a[1]) : '';
                valB = b[1] ? String(b[1]) : '';
            } else if (sortField === 'artist') {
                valA = (artistMap[a[2]] || a[2] || '').toString().toLowerCase();
                valB = (artistMap[b[2]] || b[2] || '').toString().toLowerCase();
            } else {
                valA = (venueMap[a[3]] || a[3] || '').toString().toLowerCase();
                valB = (venueMap[b[3]] || b[3] || '').toString().toLowerCase();
            }
            if (valA < valB) return sortDir === 'asc' ? -1 : 1;
            if (valA > valB) return sortDir === 'asc' ? 1 : -1;
            return 0;
        });

        return rows;
    }

    function sortConcertsBy(field) {
        if (sortField === field) sortDir = (sortDir === 'asc') ? 'desc' : 'asc';
        else { sortField = field; sortDir = 'asc'; }
        renderConcertsTable();
    }

    function updateSortArrows() {
        ['date','artist','venue'].forEach(f => {
            const el = document.getElementById('arrow-' + f);
            if (!el) return;
            el.textContent = (f === sortField) ? (sortDir === 'asc' ? '^' : 'v') : '';
        });
    }

    function renderConcertsTable() {
        updateSortArrows();
        renderFilterBanner();
        updateExportVisibleCount();

        const viewerBody = document.getElementById('viewerBody');
        viewerBody.innerHTML = '';

        const rows = getVisibleConcerts();
        if (rows.length === 0) {
            const searchBox = document.getElementById('concertSearch');
            const hasQuery = searchBox && searchBox.value.trim();
            let msg = 'No concerts yet.';
            if (activeFilter && hasQuery) msg = 'No concerts match this filter and search.';
            else if (activeFilter) msg = 'No concerts match this filter.';
            else if (hasQuery) msg = 'No concerts match your search.';
            viewerBody.innerHTML = `<tr><td colspan="4" style="text-align:center;color:#71717a;padding:32px;">${msg}</td></tr>`;
            return;
        }

        const groupByYear = (sortField === 'date');
        let lastYear = null;

        rows.forEach(row => {
            if (groupByYear) {
                const yearStr = row[1] ? String(row[1]).split('T')[0].split('-')[0] : 'Unknown';
                if (yearStr !== lastYear) {
                    lastYear = yearStr;
                    const yearRow = document.createElement('tr');
                    yearRow.innerHTML = `<td colspan="4" style="background:#1f2937;color:#93c5fd;font-weight:600;font-size:12px;letter-spacing:0.05em;padding:8px 24px;cursor:default;">-- ${escapeHtml(yearStr)}</td>`;
                    viewerBody.appendChild(yearRow);
                }
            }

            const tr = document.createElement('tr');
            tr.className = 'row-clickable';
            tr.onclick = (evt) => {
                if (evt.target.classList.contains('link-cell')) return;
                showConcertModal(row);
            };

            const artistName = artistMap[row[2]] || row[2] || '';
            const venueName  = venueMap[row[3]] || row[3] || '';
            const hasTicket  = String(row[9]).toUpperCase() === 'TRUE';

            tr.innerHTML = `
                <td style="font-weight:500;color:#fff;">${row[1] ? String(row[1]).split('T')[0] : 'N/A'}</td>
                <td><span class="link-cell" onclick="filterByArtist('${row[2]}', \`${escapeHtml(artistName).replace(/`/g, "'")}\`)">${escapeHtml(artistName)}</span></td>
                <td><span class="link-cell" onclick="filterByVenue('${row[3]}', \`${escapeHtml(venueName).replace(/`/g, "'")}\`)">${escapeHtml(venueName)}</span></td>
                <td class="ticket-col">${hasTicket ? '🎫' : ''}</td>
            `;
            viewerBody.appendChild(tr);
        });
    }

    function filterByArtist(id, name) {
        activeFilter = { type: 'artist', id: id, name: name };
        renderConcertsTable();
    }
    function filterByVenue(id, name) {
        activeFilter = { type: 'venue', id: id, name: name };
        renderConcertsTable();
    }
    function clearFilter() { activeFilter = null; renderConcertsTable(); }

    function renderFilterBanner() {
        const banner = document.getElementById('filterBanner');
        const text = document.getElementById('filterBannerText');
        if (activeFilter) {
            const labelMap = { artist: 'Artist', venue: 'Venue', promoter: 'Promoter' };
            const label = labelMap[activeFilter.type] || 'Filter';
            text.textContent = `Showing concerts for ${label}: ${activeFilter.name}`;
            banner.classList.remove('hidden');
        } else banner.classList.add('hidden');
    }

    function openExportPanel() { updateExportVisibleCount(); document.getElementById('exportPanel').classList.remove('hidden'); }
    function closeExportPanel() { document.getElementById('exportPanel').classList.add('hidden'); }
    function updateExportVisibleCount() { const el = document.getElementById('exportVisibleCount'); if (el) el.textContent = getVisibleConcerts().length; }

    function csvEscape(value) { const str = String(value ?? ''); if (/[",\n]/.test(str)) { return '"' + str.replace(/"/g, '""') + '"'; } return str; }
    function exportConcertsCsv(scope) {
        const rows = (scope === 'all') ? allConcerts.slice() : getVisibleConcerts();
        const headers = ["Date","Artist","Venue","Price","Currency","Tour","Notes","Promoter","Has Ticket"];
        const lines = [headers.map(csvEscape).join(',')];
        rows.forEach(row => {
            const artistName   = artistMap[row[2]] || row[2] || '';
            const venueName    = venueMap[row[3]] || row[3] || '';
            const promoterName = promoterMap[row[8]] || row[8] || '';
            const dateStr      = row[1] ? String(row[1]).split('T')[0] : '';
            const hasTicket    = String(row[9]).toUpperCase() === 'TRUE' ? 'Yes' : 'No';
            lines.push([
                dateStr, artistName, venueName, row[4] || '', row[5] || '', row[6] || '', row[7] || '', promoterName, hasTicket
            ].map(csvEscape).join(','));
        });
        const csvContent = lines.join('\r\n');
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        const dateTag = new Date().toISOString().split('T')[0];
        a.href = url;
        a.download = `concerts-export-${scope}-${dateTag}.csv`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        closeExportPanel();
    }

    // Modal helpers
    const modalOverlay = document.getElementById('concertModalOverlay');
    const modalBody = document.getElementById('modalBody');
    const modalTitle = document.getElementById('modalTitle');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    modalCloseBtn.addEventListener('click', closeModal);
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
    document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

    function showConcertModal(row) {
        modalOverlay.style.display = 'flex';
        modalOverlay.setAttribute('aria-hidden', 'false');
        const dateStr = row[1] ? String(row[1]).split('T')[0] : 'N/A';
        const artistName = artistMap[row[2]] || row[2] || 'Unknown';
        const venueName  = venueMap[row[3]] || row[3] || 'Unknown';
        const price      = row[4] || '';
        const currency   = row[5] || '';
        const tour       = row[6] || '';
        const notes      = row[7] || '';
        const promoter   = promoterMap[row[8]] || row[8] || '';
        const hasTicket  = String(row[9]).toUpperCase() === 'TRUE';
        const priceTiers = row[10] || '';
        const hasReview  = String(row[11]).toUpperCase() === 'TRUE';

        modalTitle.textContent = `${artistName} — ${dateStr}`;

        const priceTiersHtml = parsePriceTiersToHtml(priceTiers);

        modalBody.innerHTML = `
            <div class="row"><div class="label">Date</div><div class="value">${escapeHtml(dateStr)}</div></div>
            <div class="row"><div class="label">Artist</div><div class="value">${escapeHtml(artistName)}</div></div>
            <div class="row"><div class="label">Venue</div><div class="value">${escapeHtml(venueName)}</div></div>
            <div class="row"><div class="label">Price</div><div class="value">${escapeHtml(price)} ${escapeHtml(currency)}</div></div>
            ${priceTiersHtml}
            <div class="row"><div class="label">Tour</div><div class="value">${escapeHtml(tour)}</div></div>
            <div class="row"><div class="label">Notes</div><div class="value">${escapeHtml(notes)}</div></div>
            <div class="row"><div class="label">Promoter</div><div class="value">${escapeHtml(promoter)}</div></div>
            <div class="row"><div class="label">Has ticket</div><div class="value">${hasTicket ? 'Yes' : 'No'}</div></div>
            <div class="row"><div class="label">Has review</div><div class="value">${hasReview ? 'Yes' : 'No'}</div></div>
        `;

        // move focus to modal for accessibility
        modalCloseBtn.focus();
    }

    function closeModal() {
        modalOverlay.style.display = 'none';
        modalOverlay.setAttribute('aria-hidden', 'true');
    }

    function parsePriceTiersToHtml(encoded) {
        if (!encoded) return '';
        const parts = String(encoded).split('|').map(p => p.split(':'));
        if (parts.length === 0) return '';
        let html = '<div class="row"><div class="label">Price tiers</div><div class="value">';
        html += '<ul style="margin:0;padding-left:18px;">';
        parts.forEach(pt => {
            const name = pt[0] || 'Tier';
            const price = pt[1] || '';
            const currency = pt[2] || '';
            if (price) html += `<li>${escapeHtml(name)}: ${escapeHtml(price)} ${escapeHtml(currency)}</li>`;
        });
        html += '</ul></div></div>';
        return html;
    }

    function showStatus(msg, type) {
        const el = document.getElementById('statusMsg');
        if (!el) return;
        el.textContent = msg;
        el.className = 'status-banner ' + (type === 'error' ? 'status-error' : 'status-success');
        el.classList.remove('hidden');
        setTimeout(() => el.classList.add('hidden'), 5000);
    }
</script>
